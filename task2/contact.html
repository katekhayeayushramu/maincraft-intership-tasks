<!DOCTYPE html>
<html lang="en">

<head>
  <!-- FILE: contact.html (Contact Page) -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPortfolio - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <div class="nav-logo">MyPortfolio</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <!-- PAGE BANNER -->
  <section class="page-hero">
    <h1>Contact Me</h1>
    <p>Have a question or want to work together? Let's talk!</p>
  </section>

  <!-- CONTACT FORM SECTION -->
  <section class="contact-section">

    <form name="contactForm" onsubmit="return validateForm()">

      <div class="form-group">
        <label for="name">Your Name *</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name">
        <span class="error-msg" id="nameError">Warning: Name is required.</span>
      </div>

      <div class="form-group">
        <label for="email">Your Email *</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">
        <span class="error-msg" id="emailError">Warning: Email is required.</span>
      </div>

      <div class="form-group">
        <label for="message">Your Message</label>
        <textarea id="message" name="message" rows="5" placeholder="Write your message here..."></textarea>
      </div>

      <button type="submit" class="btn">Send Message</button>

      <div class="success-msg" id="successMsg">
        Message sent! I'll get back to you soon.
      </div>

    </form>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2025 MyPortfolio. Made with ❤️ by Ayush.</p>
  </footer>

  <!-- Script is placed at the bottom so HTML loads before JS runs -->
  <script src="script.js"></script>

</body>
</html>
